<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SACCO - Forgot Password</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card { background: #ffffff; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 100%; max-width: 400px; padding: 35px; }
        .card h2 { color: #1e3c72; margin-bottom: 8px; font-size: 24px; text-align: center; }
        .card p.subtitle { color: #666; font-size: 13px; margin-bottom: 20px; text-align: center; line-height: 1.4; }
        .form-group { margin-bottom: 15px; }
        .form-group label { font-size: 13px; font-weight: 600; color: #333; margin-bottom: 5px; display: block; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
        .btn { width: 100%; padding: 12px; background: #e67e22; color: white; border: none; border-radius: 6px; font-weight: bold; font-size: 15px; cursor: pointer; margin-top: 10px; }
        .btn:hover { background: #d35400; }
        .footer-link { margin-top: 18px; font-size: 13px; color: #555; text-align: center; }
        .footer-link a { color: #1e3c72; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Forgot Password?</h2>
        <p class="subtitle">Enter your Username, Phone Number, or NIN to alert the Admin for a password reset.</p>

        <form method="POST">
            <div class="form-group">
                <label>Username / Phone / NIN</label>
                <input type="text" name="identifier" placeholder="e.g. John Doe or 0771234567" required>
            </div>
            <button type="submit" class="btn">Request Admin Reset</button>
        </form>

        <div class="footer-link">
            Remembered your password? <a href="/login">Back to Login</a>
        </div>
    </div>
</body>
</html>
